<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Heart ❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #1a1a1a, #2d1b2e);
      color: white; font-family: Arial, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 10px #ff69b4; }
    p { text-align: center; opacity: 0.9; }
    #grid { 
      display: grid; grid-template-columns: repeat(4, 1fr); 
      gap: 15px; width: 100%; max-width: 400px; margin: 30px 0; 
    }
    .box { 
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      font-size: 2.5rem; padding: 25px 0; border-radius: 15px; 
      cursor: pointer; user-select: none; text-align: center;
      box-shadow: 0 5px 15px rgba(255,105,180,0.4);
      transition: transform 0.1s;
    }
    .box:active { transform: scale(0.95); }
    #win { display: none; text-align: center; animation: fadeIn 1s; }
    #win img {
      width: 250px; height: 250px; object-fit: cover;
      border-radius: 20px; margin: 20px auto; display: block;
      box-shadow: 0 0 30px rgba(255,105,180,0.6);
    }
    #win p { font-size: 1.3rem; line-height: 1.8; padding: 20px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
<div id="game">
  <h1>🤵 Find My Heart ❤️</h1>
  <p>One of these boxes has my heart. Can you find it?</p>
  <div id="grid"></div>
</div>
<div id="win"></div>
<audio id="bgm" src="song.mp3" loop></audio>
<script>
  let heart = Math.floor(Math.random() * 16);
  const grid = document.getElementById('grid');
  
  for(let i = 0; i < 16; i++){
    let box = document.createElement("div");
    box.className = "box";
    box.innerHTML = "💝";
    grid.appendChild(box);
    
    box.onclick = function(){
      if(i == heart){
        box.innerHTML = "❤️";
        box.style.background = "linear-gradient(135deg, #ffcdd2, #ff8a95)";
        document.getElementById('bgm').play();
        setTimeout(() => {
          document.getElementById('game').style.display = 'none';
          document.getElementById('win').innerHTML = `
            <h1 style="margin-top:20px;">🎂 Happy Birthday My Love ❤️</h1>
            <img src="her.jpg" alt="You">
            <p>
              Happy Birthday to the girl who owns my heart ❤️<br><br>
              Every day with you feels like I won this game.<br><br>
              Thank you for existing.<br><br>
              I love you forever and always.
            </p>
          `;
          document.getElementById('win').style.display = 'block';
        }, 300);
      } else {
        box.innerHTML = "💔";
        box.style.background = "linear-gradient(135deg, #f8bbd0, #f48fb1)";
        box.style.pointerEvents = "none";
      }
    }
  }
</script>
</body>
</html>
